name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validasi JSON Products
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cek semua Products/*.json valid
        run: |
          import os, json
          errors = 0
          total = 0
          for f in sorted(os.listdir("Products")):
            if f.endswith(".json"):
              total += 1
              fp = os.path.join("Products", f)
              try:
                with open(fp) as fh:
                  json.load(fh)
              except json.JSONDecodeError as e:
                print(f"INVALID: {f} - {e}")
                errors += 1
          print(f"\n{total} file JSON diperiksa, {errors} error")
          exit(errors)
        shell: python

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install flake8
      - name: Lint main.py
        run: flake8 main.py --max-line-length=200 --ignore=F401,E265,E302,E305,E501,W291,W293
      - name: Lint database.py
        run: flake8 database.py --max-line-length=200 --ignore=F401,E265,E302,E305,E501,W291,W293

  startup-test:
    name: Startup + Load Database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Test database load
        run: |
          python -c "
          from database import db
          results = db.search_products(keyword='gamis', limit=5)
          print(f'Database loaded: {len(results)} products found for \"gamis\"')
          assert len(results) > 0, 'No products found!'
          print('OK - database berfungsi')
          "
      - name: Test search_products_with_prediction
        run: |
          python -c "
          from database import db
          r = db.search_products_with_prediction(keyword='gamis', color='BLACK', limit=3)
          print(f'Search with prediction: {len(r)} results')
          if r:
            p = r[0]
            price = p.get('price', {})
            if isinstance(price, dict):
              amount = price.get('min', 0)
            else:
              amount = price
            print(f'Sample: {p.get(\"name_product\",\"?\")} - Rp{amount:,}')
          print('OK - search prediction berfungsi')
          "

  api-test:
    name: Chat API Test
    runs-on: ubuntu-latest
    needs: [startup-test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Start server & test chat
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python main.py &
          SERVER_PID=$!

          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          echo "--- Test Chat ---"
          curl -s -N -X POST http://localhost:8000/chat \
            -H "Content-Type: application/json" \
            -d '{"messages": [{"role": "user", "content": "cari gamis hitam"}]}' \
            --max-time 60

          echo ""
          echo "--- Test Root ---"
          curl -s http://localhost:8000/ | head -5

          kill $SERVER_PID 2>/dev/null
          wait $SERVER_PID 2>/dev/null
